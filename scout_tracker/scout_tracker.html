<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8568A | Spirit Scout Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(25, 25, 30, 0.6);
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.3);
            --partner: #00e676;
            --opponent: #ff1744;
            --text: #e0e0e0;
            --text-dim: #909090;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --rating: #ffd740;
            --red: #ff5252;
            --blue: #448aff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(124, 77, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 230, 118, 0.03) 0%, transparent 40%);
            overflow-x: hidden;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .logo-container {
            display: inline-block;
            position: relative;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 15px;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            width: 100px;
            text-align: center;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-refresh {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 18px;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--accent-glow);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            background: var(--glass);
            padding: 6px;
            border-radius: 18px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid var(--border);
        }

        .tab {
            padding: 10px 25px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        .tab:hover { color: white; }

        .tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Card Styles */
        .match-card, .note-card, .team-detail-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        /* Teams View Styles */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
        }

        .team-detail-card {
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid var(--border);
        }

        .team-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .team-id { font-size: 2rem; font-weight: 800; color: var(--accent); }
        .team-rating {
            font-family: 'JetBrains Mono', monospace;
            color: var(--rating);
            font-weight: 700;
            font-size: 1.1rem;
            background: rgba(255, 215, 64, 0.1);
            padding: 4px 12px;
            border-radius: 10px;
        }

        .team-matches-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .team-match-row {
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tm-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 6px;
        }

        .tm-match-num { font-weight: 800; color: white; font-size: 1.1rem; }

        .tm-alliances {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tm-alliance {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .tm-vs {
            font-weight: 800;
            color: var(--text-dim);
            font-size: 0.7rem;
            opacity: 0.5;
        }

        .tm-team-pill {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border: 1px solid transparent;
        }

        .tm-team-pill.tracked {
            background: rgba(124, 77, 255, 0.15);
            border-color: var(--accent);
        }

        .tm-team-num { font-weight: 700; font-size: 0.95rem; }
        .tm-team-ts {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--rating);
            opacity: 0.9;
        }

        .tm-score-box {
            display: flex;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 1rem;
        }

        .score-red { color: var(--red); }
        .score-blue { color: var(--blue); }

        /* Watchlist Styles */
        .watchlist { display: grid; gap: 15px; }
        .match-card { display: flex; align-items: center; gap: 25px; }
        .match-info { min-width: 90px; }
        .match-num { font-size: 1.8rem; font-weight: 800; color: white; }
        .match-time { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-dim); }

        .teams-grid { display: flex; flex-wrap: wrap; gap: 10px; flex-grow: 1; }
        .team-pill {
            padding: 10px 15px;
            border-radius: 14px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            min-width: 140px;
        }
        .team-pill.partner { border-left: 4px solid var(--partner); }
        .team-pill.opponent { border-left: 4px solid var(--opponent); }

        .team-pill-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .team-pill-num { font-weight: 700; font-size: 1.1rem; }
        .btn-note {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
        }
        .btn-note:hover { background: var(--accent); color: white; border-color: var(--accent); }

        .note-indicator {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 4px;
            font-size: 0.6rem;
            color: white;
            margin-left: 5px;
        }

        /* Common Elements */
        .loader-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid var(--glass);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
            font-style: italic;
            background: var(--glass);
            border-radius: 24px;
            border: 1px dashed var(--border);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #1a1a20;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
        .modal-close { background: none; border: none; color: var(--text-dim); font-size: 1.8rem; cursor: pointer; }
        textarea {
            width: 100%; height: 200px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            margin-bottom: 20px;
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 10px 20px; border-radius: 10px; cursor: pointer; }

        @media (max-width: 900px) {
            .team-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-container">
                <h1>8568A</h1>
                <div class="subtitle">Spirit Division Scout Tracker</div>
            </div>
        </header>

        <div class="controls">
            <div class="input-group">
                <label for="currentMatch">Current Qual Match</label>
                <input type="number" id="currentMatch" value="1" min="1">
            </div>
            <button class="btn-refresh" onclick="updateAll()">Update Data</button>
        </div>

        <div class="tabs">
            <div class="tab active" id="tabWatchlist" onclick="switchTab('watchlist')">Watchlist</div>
            <div class="tab" id="tabTeams" onclick="switchTab('teams')">Teams</div>
            <div class="tab" id="tabNotes" onclick="switchTab('notes')">Notes</div>
        </div>

        <div id="watchlistSection" class="view-section active">
            <div class="watchlist" id="watchlistContainer">
                <div class="empty-state">Loading matches...</div>
            </div>
        </div>

        <div id="teamsSection" class="view-section">
            <div class="teams-manager">
                <div class="controls" style="margin-bottom: 20px; background: var(--glass);">
                    <input type="text" id="newTeamInput" style="flex-grow:1; width:auto; text-align:left;" placeholder="Add team number (e.g. 1234A)..." onkeydown="if(event.key==='Enter') addTrackedTeam()">
                    <button class="btn-save" style="margin-top:0" onclick="addTrackedTeam()">Add Team</button>
                </div>
                <div class="team-grid" id="trackedTeamsGrid"></div>
            </div>
        </div>

        <div id="notesSection" class="view-section">
            <div class="controls" style="margin-bottom: 20px; background: var(--glass);">
                <input type="text" id="noteSearch" style="flex-grow:1; width:auto; text-align:left;" placeholder="Search notes..." oninput="renderNotes()">
                <button class="btn-save" style="margin-top:0" onclick="openNotesModal('')">+ New Note</button>
            </div>
            <div id="notesContainer"></div>
        </div>
    </div>

    <div class="loader-overlay" id="loader"><div class="spinner"></div></div>

    <div class="modal-overlay" id="notesModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Team <span id="modalTeamNum">----</span></div>
                <button class="modal-close" onclick="closeNotesModal()">&times;</button>
            </div>
            <textarea id="notesArea" placeholder="Record observations..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeNotesModal()">Cancel</button>
                <button class="btn-save" id="btnSaveNote" onclick="saveNote()">Save Notes</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:5005/api';
        let currentData = null;
        let allNotes = {};
        let trackedTeams = [];
        let currentEditingTeam = null;

        async function updateAll() {
            showLoader(true);
            try {
                const matchNum = document.getElementById('currentMatch').value;
                const [scoutRes, notesRes, teamsRes] = await Promise.all([
                    fetch(`${API_BASE}/scout-data?current_match=${matchNum}`),
                    fetch(`${API_BASE}/notes`),
                    fetch(`${API_BASE}/tracked-teams`)
                ]);
                currentData = await scoutRes.json();
                allNotes = await notesRes.json();
                const teamsData = await teamsRes.json();
                trackedTeams = Array.isArray(teamsData) ? teamsData : [];
                renderActiveTab();
            } catch (error) { console.error(error); }
            finally { showLoader(false); }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
            document.getElementById(`${tab}Section`).classList.add('active');
            renderActiveTab();
        }

        function renderActiveTab() {
            const activeTab = document.querySelector('.tab.active').id;
            if (activeTab === 'tabWatchlist') renderWatchlist();
            if (activeTab === 'tabTeams') renderTeams();
            if (activeTab === 'tabNotes') renderNotes();
        }

        function renderWatchlist() {
            const container = document.getElementById('watchlistContainer');
            if (!currentData || !currentData.watchlist.length) {
                container.innerHTML = '<div class="empty-state">No upcoming matches.</div>';
                return;
            }
            container.innerHTML = currentData.watchlist.map(match => `
                <div class="match-card">
                    <div class="match-info">
                        <div class="match-num">Q${match.match_num}</div>
                        <div class="match-time">${formatTime(match.scheduled)}</div>
                    </div>
                    <div class="teams-grid">
                        ${match.teams.map(team => `
                            <div class="team-pill ${team.relationship.toLowerCase()}">
                                <div class="team-pill-header">
                                    <div class="team-pill-num" style="color: ${team.color === 'red' ? 'var(--red)' : 'var(--blue)'}">
                                        ${team.number}${team.has_notes ? '<span class="note-indicator">📝</span>' : ''}
                                    </div>
                                    <button class="btn-note" onclick="openNotesModal('${team.number}')">Notes</button>
                                </div>
                                <div class="team-pill-rel ${team.relationship.toLowerCase()}">${team.relationship}</div>
                                <div class="team-pill-match">Play them in Q${team.our_match}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderTeams() {
            const grid = document.getElementById('trackedTeamsGrid');
            if (!currentData || !currentData.tracked_data.length) {
                grid.innerHTML = '<div class="empty-state">No teams tracked.</div>';
                return;
            }
            grid.innerHTML = currentData.tracked_data.map(team => `
                <div class="team-detail-card">
                    <div class="team-detail-header">
                        <div><span class="team-id">${team.team}</span><span class="team-rating">TS: ${team.rating}</span></div>
                        <button style="background:none;border:none;color:var(--red);cursor:pointer;font-size:1.5rem;" onclick="removeTrackedTeam('${team.team}')">&times;</button>
                    </div>
                    <div class="team-matches-list">
                        ${team.matches.map(m => {
                            const ourAlliance = m.team_color === 'red' ? 'red' : 'blue';
                            const oppAlliance = m.team_color === 'red' ? 'blue' : 'red';
                            return `
                                <div class="team-match-row">
                                    <div class="tm-header">
                                        <div class="tm-match-num">Q${m.match_num}</div>
                                        <div class="tm-score-box">
                                            <span class="score-red">${m.red_score}</span>
                                            <span style="opacity:0.3">-</span>
                                            <span class="score-blue">${m.blue_score}</span>
                                        </div>
                                    </div>
                                    <div class="tm-alliances">
                                        <div class="tm-alliance">
                                            <div class="tm-team-pill tracked">
                                                <span class="tm-team-num" style="color:var(--${m.team_color})">${team.team}</span>
                                                <span class="tm-team-ts">${team.rating}</span>
                                            </div>
                                            ${m.partner ? `
                                                <div class="tm-team-pill">
                                                    <span class="tm-team-num" style="color:var(--${m.team_color})">${m.partner.number}${m.partner.has_notes ? '📝' : ''}</span>
                                                    <span class="tm-team-ts">${m.partner.rating}</span>
                                                </div>
                                            ` : ''}
                                        </div>
                                        <div class="tm-vs">VS</div>
                                        <div class="tm-alliance">
                                            ${m.opponents.map(opp => `
                                                <div class="tm-team-pill">
                                                    <span class="tm-team-num" style="color:var(--${oppAlliance})">${opp.number}${opp.has_notes ? '📝' : ''}</span>
                                                    <span class="tm-team-ts">${opp.rating}</span>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <button class="btn-save" style="width:100%" onclick="openNotesModal('${team.team}')">+ Add Team Note</button>
                </div>
            `).join('');
        }

        function renderNotes() {
            const container = document.getElementById('notesContainer');
            const search = document.getElementById('noteSearch').value.toLowerCase();
            const filtered = Object.keys(allNotes).filter(t => t.toLowerCase().includes(search) || allNotes[t].toLowerCase().includes(search)).sort();
            if (!filtered.length) { container.innerHTML = '<div class="empty-state">No notes found.</div>'; return; }
            container.innerHTML = filtered.map(team => `
                <div class="note-card">
                    <div class="team-detail-header" style="border:none; margin-bottom:10px;">
                        <div class="team-id" style="font-size: 1.4rem;">${team}</div>
                        <button class="btn-note" onclick="openNotesModal('${team}')">Edit</button>
                    </div>
                    <div style="white-space: pre-wrap; line-height: 1.5; color: var(--text);">${allNotes[team]}</div>
                </div>
            `).join('');
        }

        async function addTrackedTeam() {
            const input = document.getElementById('newTeamInput');
            const team = input.value.trim().toUpperCase();
            if (!Array.isArray(trackedTeams)) trackedTeams = [];
            if (!team || trackedTeams.includes(team)) return;
            trackedTeams.push(team);
            input.value = '';
            await fetch(`${API_BASE}/tracked-teams`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ teams: trackedTeams }) });
            switchTab('teams');
            updateAll();
        }

        async function removeTrackedTeam(team) {
            trackedTeams = trackedTeams.filter(t => t !== team);
            await fetch(`${API_BASE}/tracked-teams`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ teams: trackedTeams }) });
            updateAll();
        }

        function openNotesModal(team) {
            if (!team) { team = prompt("Enter Team Number:"); if (!team) return; team = team.toUpperCase(); }
            currentEditingTeam = team;
            document.getElementById('modalTeamNum').innerText = team;
            document.getElementById('notesArea').value = allNotes[team] || '';
            document.getElementById('notesModal').classList.add('active');
            document.getElementById('btnSaveNote').innerText = "Save Notes";
        }

        function closeNotesModal() { document.getElementById('notesModal').classList.remove('active'); }

        async function saveNote() {
            const note = document.getElementById('notesArea').value;
            const btn = document.getElementById('btnSaveNote');
            btn.innerText = "Saving...";
            try {
                const res = await fetch(`${API_BASE}/notes`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ team: currentEditingTeam, note: note }) });
                if (res.ok) { allNotes[currentEditingTeam] = note; btn.innerText = "Saved!"; setTimeout(() => { closeNotesModal(); renderActiveTab(); }, 500); }
            } catch (e) { btn.innerText = "Error!"; }
        }

        function formatTime(iso) { return iso ? new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'TBD'; }
        function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }

        updateAll();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8568A | Spirit Scout Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(25, 25, 30, 0.6);
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.3);
            --partner: #00e676;
            --opponent: #ff1744;
            --text: #e0e0e0;
            --text-dim: #909090;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(124, 77, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 230, 118, 0.03) 0%, transparent 40%);
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            position: relative;
        }

        .logo-container {
            display: inline-block;
            position: relative;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
            padding: 25px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            width: 120px;
            text-align: center;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-refresh {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 18px;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--accent-glow);
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            flex: 1;
            padding: 15px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            text-align: center;
        }

        .stat-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .watchlist {
            display: grid;
            gap: 15px;
        }

        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 25px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .match-card:hover {
            transform: translateX(8px);
            border-color: rgba(255,255,255,0.2);
            background: rgba(35, 35, 45, 0.8);
        }

        .match-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--accent);
            opacity: 0.3;
        }

        .match-info {
            min-width: 100px;
        }

        .match-num {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
        }

        .match-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .teams-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            flex-grow: 1;
        }

        .team-pill {
            padding: 8px 16px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            min-width: 140px;
        }

        .team-pill.partner {
            border-left: 4px solid var(--partner);
        }

        .team-pill.opponent {
            border-left: 4px solid var(--opponent);
        }

        .team-num {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .team-rel {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .team-rel.partner { color: var(--partner); }
        .team-rel.opponent { color: var(--opponent); }

        .team-our-match {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10,10,12,0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
            font-style: italic;
        }

        @media (max-width: 600px) {
            .match-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-container">
                <h1>8568A</h1>
                <div class="subtitle">Spirit Division Scout Tracker</div>
            </div>
        </header>

        <div class="controls">
            <div class="input-group">
                <label for="currentMatch">Current Qual Match</label>
                <input type="number" id="currentMatch" value="1" min="1">
            </div>
            <button class="btn-refresh" onclick="fetchData()">Update Watchlist</button>
        </div>

        <div class="stats-bar" id="statsBar">
            <!-- Stats populated by JS -->
        </div>

        <div class="watchlist" id="watchlist">
            <div class="empty-state">Enter current match number and update to see who to scout...</div>
        </div>
    </div>

    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5005/api/scout-data';

        async function fetchData() {
            const currentMatch = document.getElementById('currentMatch').value;
            const loader = document.getElementById('loader');
            const watchlistEl = document.getElementById('watchlist');
            const statsBar = document.getElementById('statsBar');

            loader.style.display = 'flex';

            try {
                const response = await fetch(`${API_URL}?current_match=${currentMatch}`);
                const data = await response.json();

                if (data.status === 'success') {
                    // Update Stats
                    statsBar.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-val">${data.watchlist.length}</div>
                            <div class="stat-label">Matches to Watch</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val">${data.our_schedule.length}</div>
                            <div class="stat-label">Total Quals</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val">Spirit</div>
                            <div class="stat-label">Division</div>
                        </div>
                    `;

                    // Update Watchlist
                    if (data.watchlist.length === 0) {
                        watchlistEl.innerHTML = '<div class="empty-state">No upcoming matches for future partners or opponents. Good luck!</div>';
                    } else {
                        watchlistEl.innerHTML = data.watchlist.map(match => `
                            <div class="match-card">
                                <div class="match-info">
                                    <div class="match-num">Q${match.match_num}</div>
                                    <div class="match-time">${formatTime(match.scheduled)}</div>
                                </div>
                                <div class="teams-grid">
                                    ${match.teams.map(team => `
                                        <div class="team-pill ${team.relationship.toLowerCase()}">
                                            <div class="team-num" style="color: ${team.color === 'red' ? '#ff5252' : '#448aff'}">${team.number}</div>
                                            <div class="team-rel ${team.relationship.toLowerCase()}">${team.relationship}</div>
                                            <div class="team-our-match">You play them in Q${team.our_match}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Fetch error:', error);
                watchlistEl.innerHTML = '<div class="empty-state" style="color: #ff1744">Error connecting to backend. Make sure scout_tracker.py is running.</div>';
            } finally {
                loader.style.display = 'none';
            }
        }

        function formatTime(isoStr) {
            if (!isoStr) return 'TBD';
            const date = new Date(isoStr);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Auto-fetch on enter
        document.getElementById('currentMatch').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchData();
        });
    </script>
</body>
</html>

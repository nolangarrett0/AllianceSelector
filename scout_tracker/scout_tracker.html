<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8568A | Spirit Scout Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(25, 25, 30, 0.6);
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.3);
            --partner: #00e676;
            --opponent: #ff1744;
            --text: #e0e0e0;
            --text-dim: #909090;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(124, 77, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 230, 118, 0.03) 0%, transparent 40%);
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            position: relative;
        }

        .logo-container {
            display: inline-block;
            position: relative;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
            padding: 25px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            width: 120px;
            text-align: center;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-refresh {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 18px;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--accent-glow);
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            flex: 1;
            padding: 15px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            text-align: center;
        }

        .stat-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .watchlist, .notes-grid {
            display: grid;
            gap: 15px;
        }

        /* Tab Styles */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .tab {
            padding: 12px 30px;
            border-radius: 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* Notes View Styles */
        .notes-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-box {
            flex-grow: 1;
            position: relative;
        }

        .search-box input {
            width: 100%;
            text-align: left;
            padding-left: 45px;
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            opacity: 0.5;
        }

        .note-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .note-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .note-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .note-card-team {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
        }

        .note-content {
            color: var(--text);
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
            margin-bottom: 15px;
        }

        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 25px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .match-card:hover {
            transform: translateX(8px);
            border-color: rgba(255,255,255,0.2);
            background: rgba(35, 35, 45, 0.8);
        }

        .match-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--accent);
            opacity: 0.3;
        }

        .match-info {
            min-width: 100px;
        }

        .match-num {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
        }

        .match-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .teams-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            flex-grow: 1;
        }

        .team-pill {
            padding: 8px 16px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            min-width: 140px;
        }

        .team-pill.partner {
            border-left: 4px solid var(--partner);
        }

        .team-pill.opponent {
            border-left: 4px solid var(--opponent);
        }

        .team-num {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .team-rel {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .team-rel.partner { color: var(--partner); }
        .team-rel.opponent { color: var(--opponent); }

        .team-our-match {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10,10,12,0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
            font-style: italic;
        }

        @media (max-width: 600px) {
            .match-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            h1 { font-size: 2.5rem; }
        }

        /* Notes Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: rgba(30, 30, 40, 0.8);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: white;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-save {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .note-indicator {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 4px;
            font-size: 0.6rem;
            color: white;
            margin-left: 6px;
            vertical-align: middle;
            box-shadow: 0 0 5px var(--accent-glow);
        }

        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .btn-note {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .btn-note:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-container">
                <h1>8568A</h1>
                <div class="subtitle">Spirit Division Scout Tracker</div>
            </div>
        </header>

        <div class="controls">
            <div class="input-group">
                <label for="currentMatch">Current Qual Match</label>
                <input type="number" id="currentMatch" value="1" min="1">
            </div>
            <button class="btn-refresh" onclick="fetchData()">Update Watchlist</button>
        </div>

        <div class="tabs">
            <div class="tab active" id="tabWatchlist" onclick="switchTab('watchlist')">Watchlist</div>
            <div class="tab" id="tabNotes" onclick="switchTab('notes')">All Team Notes</div>
        </div>

        <div id="watchlistSection" class="view-section active">
            <div class="stats-bar" id="statsBar">
                <!-- Stats populated by JS -->
            </div>

            <div class="watchlist" id="watchlist">
                <div class="empty-state">Enter current match number and update to see who to scout...</div>
            </div>
        </div>

        <div id="notesSection" class="view-section">
            <div class="notes-controls">
                <div class="search-box">
                    <input type="text" id="noteSearch" placeholder="Search team or note content..." oninput="renderNotes()">
                </div>
                <button class="btn-save" style="margin-top: 0; padding: 12px 20px;" onclick="openNotesModal('')">+ Add Team Note</button>
            </div>
            <div class="notes-grid" id="notesGrid">
                <!-- Notes populated by JS -->
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
    </div>

    <!-- Notes Modal -->
    <div class="modal-overlay" id="notesModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Team <span id="modalTeamNum">----</span> Notes</div>
                <button class="modal-close" onclick="closeNotesModal()">&times;</button>
            </div>
            <textarea id="notesArea" placeholder="Record observations, auto-autonomous patterns, driver behavior..."></textarea>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeNotesModal()">Cancel</button>
                <button class="btn-save" onclick="saveNotes()">Save Notes</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:5005/api';
        let currentEditingTeam = null;
        let allNotes = {};

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));

            if (tabName === 'watchlist') {
                document.getElementById('tabWatchlist').classList.add('active');
                document.getElementById('watchlistSection').classList.add('active');
                fetchData();
            } else {
                document.getElementById('tabNotes').classList.add('active');
                document.getElementById('notesSection').classList.add('active');
                fetchNotes();
            }
        }

        async function fetchNotes() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            try {
                const response = await fetch(`${API_BASE}/notes`);
                allNotes = await response.json();
                renderNotes();
            } catch (error) {
                console.error('Error fetching notes:', error);
            } finally {
                loader.style.display = 'none';
            }
        }

        function renderNotes() {
            const grid = document.getElementById('notesGrid');
            const search = document.getElementById('noteSearch').value.toLowerCase();
            
            const filteredTeams = Object.keys(allNotes).filter(team => {
                return team.toLowerCase().includes(search) || allNotes[team].toLowerCase().includes(search);
            }).sort((a, b) => {
                // Numeric sort for team numbers
                const aNum = parseInt(a) || 0;
                const bNum = parseInt(b) || 0;
                return aNum - bNum;
            });

            if (filteredTeams.length === 0) {
                grid.innerHTML = '<div class="empty-state">No notes found matching your search.</div>';
                return;
            }

            grid.innerHTML = filteredTeams.map(team => `
                <div class="note-card">
                    <div class="note-card-header">
                        <div class="note-card-team">${team}</div>
                        <button class="btn-note" onclick="openNotesModal('${team}')">Edit Note</button>
                    </div>
                    <div class="note-content">${allNotes[team]}</div>
                </div>
            `).join('');
        }

        async function fetchData() {
            const currentMatch = document.getElementById('currentMatch').value;
            const loader = document.getElementById('loader');
            const watchlistEl = document.getElementById('watchlist');
            const statsBar = document.getElementById('statsBar');

            loader.style.display = 'flex';

            try {
                const response = await fetch(`${API_BASE}/scout-data?current_match=${currentMatch}`);
                const data = await response.json();

                if (data.status === 'success') {
                    // Update Stats
                    statsBar.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-val">${data.watchlist.length}</div>
                            <div class="stat-label">Matches to Watch</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val">${data.our_schedule.length}</div>
                            <div class="stat-label">Total Quals</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val">Spirit</div>
                            <div class="stat-label">Division</div>
                        </div>
                    `;

                    // Update Watchlist
                    if (data.watchlist.length === 0) {
                        watchlistEl.innerHTML = '<div class="empty-state">No upcoming matches for future partners or opponents. Good luck!</div>';
                    } else {
                        watchlistEl.innerHTML = data.watchlist.map(match => `
                            <div class="match-card">
                                <div class="match-info">
                                    <div class="match-num">Q${match.match_num}</div>
                                    <div class="match-time">${formatTime(match.scheduled)}</div>
                                </div>
                                <div class="teams-grid">
                                    ${match.teams.map(team => `
                                        <div class="team-pill ${team.relationship.toLowerCase()}">
                                            <div class="team-header">
                                                <div class="team-num" style="color: ${team.color === 'red' ? '#ff5252' : '#448aff'}">
                                                    ${team.number}
                                                    ${team.has_notes ? '<span class="note-indicator" title="Has notes">📝</span>' : ''}
                                                </div>
                                                <button class="btn-note" onclick="openNotesModal('${team.number}')">Notes</button>
                                            </div>
                                            <div class="team-rel ${team.relationship.toLowerCase()}">${team.relationship}</div>
                                            <div class="team-our-match">You play them in Q${team.our_match}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Fetch error:', error);
                watchlistEl.innerHTML = '<div class="empty-state" style="color: #ff1744">Error connecting to backend. Make sure scout_tracker.py is running.</div>';
            } finally {
                loader.style.display = 'none';
            }
        }

        function formatTime(isoStr) {
            if (!isoStr) return 'TBD';
            const date = new Date(isoStr);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Notes Logic
        async function openNotesModal(teamNumber) {
            currentEditingTeam = teamNumber;
            
            // If teamNumber is empty, it's a new team
            if (!teamNumber) {
                const manualTeam = prompt("Enter Team Number:");
                if (!manualTeam) return;
                currentEditingTeam = manualTeam.toUpperCase();
            }

            document.getElementById('modalTeamNum').innerText = currentEditingTeam;
            document.getElementById('notesArea').value = 'Loading...';
            
            const modal = document.getElementById('notesModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);

            try {
                const response = await fetch(`${API_BASE}/notes`);
                allNotes = await response.json();
                document.getElementById('notesArea').value = allNotes[currentEditingTeam] || '';
            } catch (error) {
                console.error('Error fetching notes:', error);
                document.getElementById('notesArea').value = 'Error loading notes.';
            }
        }

        function closeNotesModal() {
            const modal = document.getElementById('notesModal');
            modal.classList.remove('active');
            
            // Reset save button state
            const saveBtn = document.querySelector('.btn-save');
            saveBtn.innerText = 'Save Notes';
            saveBtn.disabled = false;
            
            setTimeout(() => modal.style.display = 'none', 300);
            currentEditingTeam = null;
        }

        async function saveNotes() {
            if (!currentEditingTeam) return;

            const note = document.getElementById('notesArea').value;
            const saveBtn = document.querySelector('.btn-save');
            
            saveBtn.innerText = 'Saving...';
            saveBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/notes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ team: currentEditingTeam, note: note })
                });

                if (response.ok) {
                    saveBtn.innerText = 'Saved!';
                    setTimeout(() => {
                        closeNotesModal();
                        if (document.getElementById('notesSection').classList.contains('active')) {
                            fetchNotes();
                        } else {
                            fetchData(); // Refresh to update note indicators
                        }
                    }, 500);
                } else {
                    alert('Failed to save note.');
                    saveBtn.innerText = originalText;
                    saveBtn.disabled = false;
                }
            } catch (error) {
                console.error('Error saving note:', error);
                alert('Error saving note.');
                saveBtn.innerText = originalText;
                saveBtn.disabled = false;
            }
        }

        // Auto-fetch on enter
        document.getElementById('currentMatch').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchData();
        });
    </script>
</body>
</html>

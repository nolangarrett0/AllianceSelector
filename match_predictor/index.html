<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Predictor - 8568A</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: #1a1f35;
            --surface-hover: #232a45;
            --text-main: #f0f4f8;
            --text-muted: #8b9bb4;
            --red-alliance: #ff4b4b;
            --red-glow: rgba(255, 75, 75, 0.15);
            --blue-alliance: #4b88ff;
            --blue-glow: rgba(75, 136, 255, 0.15);
            --accent-glow: #8e2de2;
            --accent-glow-2: #4a00e0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: linear-gradient(135deg, var(--bg-color), var(--surface-color));
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%; left: 50%;
            width: 100%; height: 200%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 50%);
            transform: translateX(-50%);
            opacity: 0.1;
            pointer-events: none;
        }

        .header h1 {
            font-size: 2.6rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #a5b4cb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative; z-index: 1;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0.4rem 0 0 0;
            position: relative; z-index: 1;
        }

        .controls {
            margin-top: 1.2rem;
            position: relative; z-index: 1;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-glow), var(--accent-glow-2));
            color: white;
            border: none;
            padding: 0.7rem 1.4rem;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(74, 0, 224, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 0, 224, 0.6);
        }

        .btn:disabled {
            background: #333;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            color: #888;
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 900px;
            width: 92%;
            margin: 1.5rem auto 3rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* ===== MATCH CARD ===== */
        .match-card {
            background-color: var(--surface-color);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .match-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.1);
        }

        /* Top row: match label + prediction badge */
        .match-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9rem 1.2rem 0.4rem;
        }

        .match-label {
            display: flex;
            align-items: baseline;
            gap: 0.6rem;
        }

        .match-name {
            font-size: 1.15rem;
            font-weight: 800;
            color: #fff;
        }

        .match-time {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .winner-badge {
            padding: 0.3rem 0.9rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .winner-red {
            background-color: var(--red-glow);
            color: var(--red-alliance);
            border: 1px solid rgba(255, 75, 75, 0.3);
        }

        .winner-blue {
            background-color: var(--blue-glow);
            color: var(--blue-alliance);
            border: 1px solid rgba(75, 136, 255, 0.3);
        }

        .outcome-badge {
            margin-left: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .outcome-win {
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .outcome-loss {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .outcome-tossup {
            background: rgba(255, 165, 2, 0.15);
            color: #ffa502;
            border: 1px solid rgba(255, 165, 2, 0.3);
        }

        /* Middle: the alliance matchup row */
        .matchup-row {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.3rem 1.2rem 0.6rem;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .alliance-group {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 600;
            font-size: 1rem;
        }

        .alliance-red { color: var(--red-alliance); }
        .alliance-blue { color: var(--blue-alliance); }

        .team-pill {
            padding: 0.25rem 0.6rem;
            border-radius: 5px;
            background: rgba(255,255,255,0.06);
            font-size: 0.95rem;
        }

        .team-pill.target-team {
            border: 2px solid rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.12);
        }

        .vs-divider {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 400;
            padding: 0 0.2rem;
        }

        .plus-sign {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Confidence bar — spans entire bottom of card */
        .confidence-bar-container {
            width: 100%;
            height: 5px;
            display: flex;
        }

        .conf-red {
            height: 100%;
            background: var(--red-alliance);
            transition: width 0.8s ease-in-out;
        }

        .conf-blue {
            height: 100%;
            background: var(--blue-alliance);
            transition: width 0.8s ease-in-out;
        }

        /* ===== EXPANDED DETAILS ===== */
        .match-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease-in-out;
            background: rgba(0,0,0,0.15);
        }

        .match-card.expanded .match-details {
            max-height: 300px;
        }

        .details-inner {
            padding: 1.2rem;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .detail-col {
            background: rgba(255,255,255,0.03);
            padding: 0.8rem;
            border-radius: 8px;
        }

        .detail-col h4 {
            margin: 0 0 0.6rem 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.4rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px dashed rgba(255,255,255,0.08);
        }

        .detail-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .explanation {
            margin-top: 0.8rem;
            padding: 0.8rem;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            font-size: 0.85rem;
            color: #9ab0cc;
            line-height: 1.5;
            text-align: center;
            font-style: italic;
        }

        /* ===== LOADING OVERLAY ===== */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 15, 25, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent-glow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 1rem;
            font-size: 1.1rem;
            color: var(--text-main);
            font-weight: 600;
        }

        .progress-container {
            width: 80%;
            max-width: 360px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-glow), var(--accent-glow-2));
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-detail {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            min-height: 18px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Worlds Predictor</h1>
        <p>VEX Robotics Spirit Division &bull; Team 8568A</p>
        <p id="lastPlayedInfo" style="font-size: 0.95rem; color: #a5b4cb; font-weight: 600; margin-top: 0.5rem; letter-spacing: 0.5px;">Data Current Through: <span style="color: #fff;">Loading...</span></p>
        <div class="controls">
            <button class="btn" id="refreshBtn" onclick="fetchPredictions()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                Sync Live Data
            </button>
        </div>
    </div>

    <div class="container" id="matchContainer">
        <!-- Matches populated by JS -->
    </div>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Analyzing Neural Data...</div>
        <div class="progress-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-detail" id="progressDetail">Initializing...</div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5001/api/predictions';
        const PROGRESS_URL = 'http://127.0.0.1:5001/api/progress';

        async function fetchPredictions() {
            const container = document.getElementById('matchContainer');
            const loader = document.getElementById('loading');
            const btn = document.getElementById('refreshBtn');
            const progressFill = document.getElementById('progressFill');
            const progressDetail = document.getElementById('progressDetail');

            loader.classList.add('active');
            btn.disabled = true;
            progressFill.style.width = '0%';
            progressDetail.textContent = 'Connecting to backend...';

            let progressInterval = setInterval(async () => {
                try {
                    const pRes = await fetch(PROGRESS_URL);
                    const pData = await pRes.json();
                    if (pData.status !== 'idle') {
                        progressFill.style.width = pData.percent + '%';
                        progressDetail.textContent = pData.detail;
                    }
                } catch (e) {
                    // Ignore errors, server might be busy
                }
            }, 500);

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                const lastInfo = document.getElementById('lastPlayedInfo');
                if (lastInfo) {
                    lastInfo.innerHTML = `Data Current Through: <span style="color: #fff;">${data.last_played || 'None'}</span>`;
                }
                
                renderMatches(data.predictions);
            } catch (error) {
                console.error('Failed to fetch predictions:', error);
                container.innerHTML = `<div style="text-align:center; color:#ff4b4b; padding:2rem;">
                    <h3>Connection Error</h3>
                    <p>Make sure the backend server is running on port 5001.</p>
                </div>`;
            } finally {
                clearInterval(progressInterval);
                loader.classList.remove('active');
                btn.disabled = false;
            }
        }

        function renderMatches(predictions) {
            const container = document.getElementById('matchContainer');
            container.innerHTML = '';

            predictions.forEach((m) => {
                const r1 = m.red[0];
                const r2 = m.red[1];
                const b1 = m.blue[0];
                const b2 = m.blue[1];

                const isRedTarget = r1 === '8568A' || r2 === '8568A';
                const isBlueTarget = b1 === '8568A' || b2 === '8568A';

                let targetOutcome = "";
                let outcomeClass = "";
                
                if (m.winner === "Toss-Up") {
                    targetOutcome = "TOSS-UP";
                    outcomeClass = "outcome-tossup";
                } else if ((isRedTarget && m.winner === 'Red') || (isBlueTarget && m.winner === 'Blue')) {
                    targetOutcome = "WIN";
                    outcomeClass = "outcome-win";
                } else {
                    targetOutcome = "LOSS";
                    outcomeClass = "outcome-loss";
                }

                const pill = (team) => `<span class="team-pill ${team === '8568A' ? 'target-team' : ''}">${team}</span>`;

                const html = `
                    <div class="match-card" onclick="this.classList.toggle('expanded')">
                        <div class="match-top-row">
                            <div class="match-label">
                                <span class="match-name">${m.match}</span>
                                <span class="match-time">${m.time}</span>
                                <span class="outcome-badge ${outcomeClass}">${targetOutcome}</span>
                            </div>
                            <div class="winner-badge ${m.winner === 'Red' ? 'winner-red' : m.winner === 'Blue' ? 'winner-blue' : 'outcome-tossup'}">
                                ${m.winner} &bull; ${m.confidence}%
                            </div>
                        </div>

                        <div class="matchup-row">
                            <span class="alliance-group alliance-red">
                                ${pill(r1)} <span class="plus-sign">+</span> ${pill(r2)}
                            </span>
                            <span class="vs-divider">VS</span>
                            <span class="alliance-group alliance-blue">
                                ${pill(b1)} <span class="plus-sign">+</span> ${pill(b2)}
                            </span>
                        </div>

                        <div class="confidence-bar-container">
                            <div class="conf-red" style="width: ${m.red_conf}%"></div>
                            <div class="conf-blue" style="width: ${m.blue_conf}%"></div>
                        </div>

                        <div class="match-details">
                            <div class="details-inner">
                                <div class="details-grid">
                                    <div class="detail-col">
                                        <h4 style="color:var(--red-alliance);">Red Power Ratings</h4>
                                        <div class="detail-row"><span>${r1}</span><span>${m.details.red_ratings[r1]}</span></div>
                                        <div class="detail-row"><span>${r2}</span><span>${m.details.red_ratings[r2]}</span></div>
                                        <div class="detail-row" style="font-weight:bold;"><span>Combined</span><span>${(m.details.red_ratings[r1] + m.details.red_ratings[r2]).toFixed(1)}</span></div>
                                    </div>
                                    <div class="detail-col">
                                        <h4 style="color:var(--blue-alliance);">Blue Power Ratings</h4>
                                        <div class="detail-row"><span>${b1}</span><span>${m.details.blue_ratings[b1]}</span></div>
                                        <div class="detail-row"><span>${b2}</span><span>${m.details.blue_ratings[b2]}</span></div>
                                        <div class="detail-row" style="font-weight:bold;"><span>Combined</span><span>${(m.details.blue_ratings[b1] + m.details.blue_ratings[b2]).toFixed(1)}</span></div>
                                    </div>
                                </div>
                                <div class="explanation">
                                    ${m.details.explanation}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // Fetch on load
        document.addEventListener('DOMContentLoaded', fetchPredictions);
    </script>
</body>
</html>
